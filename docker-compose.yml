services:
  localstack:
    image: localstack/localstack
    networks:
      - hmpps
    container_name: localstack-data-domain
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,sns
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"

  postgres:
    image: "postgis/postgis:14-3.5"
    platform: linux/amd64
    container_name: sas-postgres
    environment:
      - JAVA_TOOL_OPTIONS=-XX:UseSVE=0
      - POSTGRES_USER=sas_user
      - POSTGRES_PASSWORD=sas_psw
      - POSTGRES_DB=sas_db
    volumes:
      - sas-postgres-data-api:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

volumes:
  sas-postgres-data-api:

networks:
  hmpps:
